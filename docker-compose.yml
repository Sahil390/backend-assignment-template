version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: waygood-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: waygood-backend
    ports:
      - '4000:4000'
    environment:
      - MONGODB_URI=mongodb://mongo:27017/waygood-evaluation
      - PORT=4000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongo
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: waygood-frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host
    depends_on:
      - backend

volumes:
  mongo-data:
